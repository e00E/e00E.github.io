{% extends "base.html" %}

{% block title %}{{ page.title }}{% endblock title %}

{% block content %}

<article>
  <h1>{{ page.title }}</h1>
  {{ page.content | safe }}
  <footer>
    created <time>{{ page.date }}</time>{% if page.updated %}, updated <time>{{ page.updated }}</time>{% endif %}
    <nav><a href="/">root</a> · <a href="..">blog</a></nav>
  </footer>
</article>

{% endblock content %}
